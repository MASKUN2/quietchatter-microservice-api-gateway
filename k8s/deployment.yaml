apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: quietchatter
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      nodeSelector:
        quietchatter.io/role: gateway
      containers:
        - name: api-gateway
          image: maskun2/quietchatter-microservice-api-gateway:IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATA_REDIS_HOST
              value: redis.quietchatter.svc.cluster.local
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: quietchatter-secrets
                  key: JWT_SECRET_KEY
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: quietchatter-secrets
                  key: INTERNAL_SECRET
            - name: MEMBER_SERVICE_URL
              value: http://member.quietchatter.svc.cluster.local:8083
            - name: BOOK_SERVICE_URL
              value: http://book.quietchatter.svc.cluster.local:8081
            - name: TALK_SERVICE_URL
              value: http://talk.quietchatter.svc.cluster.local:8084
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC -Xss512k"
          resources:
            limits:
              memory: 450Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: quietchatter
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
