server:
  port: 8080

spring:
  application:
    name: microservice-api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: ${MEMBER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/auth/**
            - id: member-service
              uri: ${MEMBER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/members/**
            - id: support-service
              uri: ${MEMBER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/support/**
            - id: book-service
              uri: ${BOOK_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/books/**
            - id: talk-service
              uri: ${TALK_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/talks/**,/api/reactions/**

jwt:
  secret-key: your-very-long-secret-key-at-least-32-chars-long

app:
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "https://your-frontend-domain.com"
